openapi: 3.0.3
info:
  title: Bank REST API
  version: 1.0.0
servers:
  - url: http://localhost:8080
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiErrorDto:
      type: object
      properties:
        timestamp: { type: string, format: date-time }
        status: { type: integer }
        error: { type: string }
        message: { type: string }
        path: { type: string }
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
    LoginResponse:
      type: object
      properties:
        accessToken: { type: string }
        tokenType: { type: string }
        expiresIn: { type: integer, format: int64 }
    MeResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        username: { type: string }
        role: { type: string, enum: [ADMIN, USER] }
    CardResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        ownerId: { type: integer, format: int64 }
        maskedPan: { type: string, example: "**** **** **** 1234" }
        holderName: { type: string }
        expiryMonth: { type: integer }
        expiryYear: { type: integer }
        status: { type: string, enum: [ACTIVE, BLOCKED, EXPIRED] }
        balance: { type: number }
    UserCardResponse:
      allOf:
        - $ref: '#/components/schemas/CardResponse'
    BalanceCardResponse:
      type: object
      properties:
        balance: { type: number }
    CreateCardRequest:
      type: object
      required: [ownerId, pan, holderName, expiryMonth, expiryYear]
      properties:
        ownerId: { type: integer, format: int64 }
        pan: { type: string }
        holderName: { type: string }
        expiryMonth: { type: integer, minimum: 1, maximum: 12 }
        expiryYear: { type: integer }
    UpdateCardStatusRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ACTIVE, BLOCKED, EXPIRED] }
    CreateUserRequest:
      type: object
      required: [username, password, role]
      properties:
        username: { type: string }
        password: { type: string }
        role: { type: string, enum: [ADMIN, USER] }
    UpdateUserRequest:
      type: object
      properties:
        enabled: { type: boolean }
        role: { type: string, enum: [ADMIN, USER] }
    AdminUserResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        username: { type: string }
        role: { type: string, enum: [ADMIN, USER] }
        enabled: { type: boolean }
    TransferRequest:
      type: object
      required: [fromCardId, toCardId, amount]
      properties:
        fromCardId: { type: integer, format: int64 }
        toCardId: { type: integer, format: int64 }
        amount: { type: number, minimum: 0.01 }
    TransferResponse:
      type: object
      properties:
        fromCardId: { type: integer, format: int64 }
        toCardId: { type: integer, format: int64 }
        amount: { type: number }
        fromBalance: { type: number }
        toBalance: { type: number }
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
  /auth/me:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }
  /admin/cards:
    get:
      responses: { '200': { description: OK } }
  /admin/cards/create:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCardRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CardResponse' }
  /admin/cards/{id}/status:
    patch:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCardStatusRequest' }
      responses: { '200': { description: OK } }
  /admin/cards/{id}:
    delete:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses: { '204': { description: No Content } }
  /admin/users:
    get:
      responses: { '200': { description: OK } }
  /admin/users/create:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateUserRequest' }
      responses: { '200': { description: OK } }
  /admin/users/{id}:
    patch:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserRequest' }
      responses: { '200': { description: OK } }
    delete:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses: { '204': { description: No Content } }
  /cards:
    get:
      responses: { '200': { description: OK } }
  /cards/{id}:
    get:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses: { '200': { description: OK } }
  /cards/{id}/balance:
    get:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses: { '200': { description: OK } }
  /cards/{id}/block-request:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses: { '200': { description: OK } }
  /transfers:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransferRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransferResponse' }
